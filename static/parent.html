<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KinderAGI — Zona părinților</title>
<style>
  *{box-sizing:border-box;margin:0}
  body{font-family:system-ui,Segoe UI,sans-serif;background:#f4f6f4;color:#1d2b22;padding:24px;max-width:960px;margin:auto}
  h1{font-size:1.4rem;margin-bottom:4px} .sub{color:#5a6b60;font-size:.9rem;margin-bottom:18px}
  .card{background:#fff;border:1px solid #d8e2da;border-radius:12px;padding:18px;margin-bottom:16px}
  input,button{padding:10px 14px;font-size:1rem;border-radius:8px;border:1px solid #b9c9bd}
  button{background:#1d4d33;color:#fff;border:none;cursor:pointer;margin-left:8px}
  button.danger{background:#a33}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th,td{padding:8px 10px;border-bottom:1px solid #e3ece5;text-align:left;vertical-align:top}
  tr.flag{background:#fff4e5}
  .ok{color:#1a7a3a;font-weight:600}.bad{color:#a33;font-weight:600}
  .pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:.75rem;background:#e8f0ea}
  #meta{font-size:.8rem;color:#5a6b60;word-break:break-all;margin-top:8px}
</style>
</head>
<body>
<h1>Zona părinților</h1>
<div class="sub">Jurnal local, semnat Ed25519 — fiecare rând e verificat criptografic la afișare.</div>

<div class="card">
  <label>PIN părinte: <input id="pin" type="password" value=""></label>
  <button onclick="load()">Deschide jurnalul</button>
  <button class="danger" onclick="clearLog()">Șterge tot jurnalul</button>
  <div id="meta"></div>
</div>

<div class="card"><table id="t">
  <thead><tr><th>Ora</th><th>Copil</th><th>AMI</th><th>Mod</th><th>Flag</th><th>Semnătură</th></tr></thead>
  <tbody></tbody>
</table></div>

<script>
async function load(){
  const pin=document.getElementById('pin').value;
  const r=await fetch('/api/parent/log?pin='+encodeURIComponent(pin));
  if(!r.ok){alert('PIN greșit');return;}
  const d=await r.json();
  document.getElementById('meta').textContent='Cheie publică notar: '+d.notary_pubkey;
  const tb=document.querySelector('#t tbody');tb.innerHTML='';
  for(const t of d.turns){
    const tr=document.createElement('tr');
    if(t.flagged_for_parent)tr.className='flag';
    tr.innerHTML=`<td>${t.ts}</td><td>${esc(t.child_message)}</td><td>${esc(t.reply)}</td>
      <td><span class="pill">${t.mode}</span></td>
      <td>${t.flagged_for_parent?('⚠ '+esc(t.input_detail||'')):'—'}</td>
      <td class="${t.signature_valid?'ok':'bad'}">${t.signature_valid?'validă ✓':'INVALIDĂ ✗'}</td>`;
    tb.appendChild(tr);
  }
}
async function clearLog(){
  const pin=document.getElementById('pin').value;
  if(!confirm('Ștergi definitiv jurnalul local?'))return;
  const r=await fetch('/api/parent/clear?pin='+encodeURIComponent(pin),{method:'POST'});
  if(!r.ok){alert('PIN greșit');return;}
  load();
}
const esc=s=>String(s??'').replace(/</g,'&lt;');
</script>
</body>
</html>
